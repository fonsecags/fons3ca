<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Background grid -->
  <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#141414" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Automation layer: low horizontal bars (the machine doing its thing) -->
  <g opacity="0.25">
    <rect x="100" y="460" width="80"  height="8" rx="1" fill="#333333"/>
    <rect x="200" y="440" width="80"  height="8" rx="1" fill="#333333"/>
    <rect x="300" y="470" width="80"  height="8" rx="1" fill="#333333"/>
    <rect x="400" y="450" width="80"  height="8" rx="1" fill="#333333"/>
    <rect x="500" y="465" width="80"  height="8" rx="1" fill="#333333"/>
    <rect x="600" y="445" width="80"  height="8" rx="1" fill="#333333"/>
    <rect x="700" y="460" width="80"  height="8" rx="1" fill="#333333"/>
    <rect x="800" y="440" width="80"  height="8" rx="1" fill="#333333"/>
    <rect x="900" y="455" width="80"  height="8" rx="1" fill="#333333"/>
    <rect x="1000" y="465" width="80" height="8" rx="1" fill="#333333"/>
  </g>

  <!-- Strategy layer: single elevated line -->
  <line x1="80" y1="260" x2="1120" y2="260" stroke="#1E1E1E" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- The climb: data points rising toward strategy -->
  <polyline
    points="80,520 200,490 320,455 420,430 520,400 600,370 680,330 760,300 860,272 960,264 1060,260 1120,260"
    fill="none" stroke="#4B9EFF" stroke-width="2.5" opacity="0.8"/>

  <!-- Glow on the line -->
  <polyline
    points="80,520 200,490 320,455 420,430 520,400 600,370 680,330 760,300 860,272 960,264 1060,260 1120,260"
    fill="none" stroke="#4B9EFF" stroke-width="8" opacity="0.06"/>

  <!-- Data point circles on the line -->
  <g fill="#4B9EFF">
    <circle cx="200"  cy="490" r="3.5" opacity="0.4"/>
    <circle cx="320"  cy="455" r="3.5" opacity="0.5"/>
    <circle cx="420"  cy="430" r="3.5" opacity="0.55"/>
    <circle cx="520"  cy="400" r="3.5" opacity="0.6"/>
    <circle cx="600"  cy="370" r="4"   opacity="0.65"/>
    <circle cx="680"  cy="330" r="4"   opacity="0.7"/>
    <circle cx="760"  cy="300" r="4"   opacity="0.75"/>
    <circle cx="860"  cy="272" r="4.5" opacity="0.85"/>
    <circle cx="960"  cy="264" r="4.5" opacity="0.9"/>
    <circle cx="1060" cy="260" r="5"   opacity="1"/>
  </g>

  <!-- Terminal point highlight -->
  <circle cx="1060" cy="260" r="14" fill="none" stroke="#4B9EFF" stroke-width="1" opacity="0.25"/>
  <circle cx="1060" cy="260" r="24" fill="none" stroke="#4B9EFF" stroke-width="0.5" opacity="0.1"/>

  <!-- Strategy label at the line -->
  <rect x="82" y="244" width="88" height="20" rx="2" fill="#0A0A0A"/>
  <text x="90" y="257" font-family="monospace" font-size="10" fill="#4B9EFF" letter-spacing="2" opacity="0.7">STRATEGY</text>

  <!-- Vertical drop lines from points to bottom (showing the gap) -->
  <g stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 4" opacity="0.5">
    <line x1="600"  y1="370" x2="600"  y2="520"/>
    <line x1="760"  y1="300" x2="760"  y2="520"/>
    <line x1="960"  y1="264" x2="960"  y2="520"/>
  </g>

  <!-- Bottom label -->
  <text x="60" y="596" font-family="monospace" font-size="11" fill="#2a2a2a" letter-spacing="3">THE GAP</text>
  <line x1="135" y1="591" x2="420" y2="591" stroke="#1A1A1A" stroke-width="1"/>
</svg>
