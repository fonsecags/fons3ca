<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Background -->
  <rect width="800" height="500" fill="#0A0A0A"/>

  <!-- Chip grid - Gen 1 (top-left, smallest) -->
  <g opacity="0.4">
    <rect x="100" y="120" width="100" height="100" rx="6" fill="#111111" stroke="#1E1E1E" stroke-width="1.5"/>
    <!-- internal grid lines -->
    <line x1="125" y1="120" x2="125" y2="220" stroke="#1E1E1E" stroke-width="1"/>
    <line x1="150" y1="120" x2="150" y2="220" stroke="#1E1E1E" stroke-width="1"/>
    <line x1="175" y1="120" x2="175" y2="220" stroke="#1E1E1E" stroke-width="1"/>
    <line x1="100" y1="145" x2="200" y2="145" stroke="#1E1E1E" stroke-width="1"/>
    <line x1="100" y1="170" x2="200" y2="170" stroke="#1E1E1E" stroke-width="1"/>
    <line x1="100" y1="195" x2="200" y2="195" stroke="#1E1E1E" stroke-width="1"/>
    <!-- core -->
    <rect x="135" y="145" width="30" height="30" rx="2" fill="#4B9EFF" opacity="0.3"/>
    <!-- pins -->
    <line x1="100" y1="135" x2="88" y2="135" stroke="#555555" stroke-width="2"/>
    <line x1="100" y1="155" x2="88" y2="155" stroke="#555555" stroke-width="2"/>
    <line x1="100" y1="175" x2="88" y2="175" stroke="#555555" stroke-width="2"/>
    <line x1="100" y1="195" x2="88" y2="195" stroke="#555555" stroke-width="2"/>
    <line x1="200" y1="135" x2="212" y2="135" stroke="#555555" stroke-width="2"/>
    <line x1="200" y1="155" x2="212" y2="155" stroke="#555555" stroke-width="2"/>
    <line x1="200" y1="175" x2="212" y2="175" stroke="#555555" stroke-width="2"/>
    <line x1="200" y1="195" x2="212" y2="195" stroke="#555555" stroke-width="2"/>
    <text x="150" y="234" text-anchor="middle" font-family="monospace" font-size="10" fill="#555555">MTIA v1</text>
  </g>

  <!-- Chip - Gen 2 -->
  <g opacity="0.6">
    <rect x="230" y="105" width="120" height="120" rx="6" fill="#111111" stroke="#2a2a2a" stroke-width="1.5"/>
    <line x1="260" y1="105" x2="260" y2="225" stroke="#222222" stroke-width="1"/>
    <line x1="290" y1="105" x2="290" y2="225" stroke="#222222" stroke-width="1"/>
    <line x1="320" y1="105" x2="320" y2="225" stroke="#222222" stroke-width="1"/>
    <line x1="230" y1="135" x2="350" y2="135" stroke="#222222" stroke-width="1"/>
    <line x1="230" y1="165" x2="350" y2="165" stroke="#222222" stroke-width="1"/>
    <line x1="230" y1="195" x2="350" y2="195" stroke="#222222" stroke-width="1"/>
    <rect x="262" y="138" width="36" height="36" rx="2" fill="#4B9EFF" opacity="0.4"/>
    <line x1="230" y1="120" x2="216" y2="120" stroke="#555555" stroke-width="2"/>
    <line x1="230" y1="145" x2="216" y2="145" stroke="#555555" stroke-width="2"/>
    <line x1="230" y1="170" x2="216" y2="170" stroke="#555555" stroke-width="2"/>
    <line x1="230" y1="195" x2="216" y2="195" stroke="#555555" stroke-width="2"/>
    <line x1="230" y1="218" x2="216" y2="218" stroke="#555555" stroke-width="2"/>
    <line x1="350" y1="120" x2="364" y2="120" stroke="#555555" stroke-width="2"/>
    <line x1="350" y1="145" x2="364" y2="145" stroke="#555555" stroke-width="2"/>
    <line x1="350" y1="170" x2="364" y2="170" stroke="#555555" stroke-width="2"/>
    <line x1="350" y1="195" x2="364" y2="195" stroke="#555555" stroke-width="2"/>
    <line x1="350" y1="218" x2="364" y2="218" stroke="#555555" stroke-width="2"/>
    <text x="290" y="239" text-anchor="middle" font-family="monospace" font-size="10" fill="#555555">MTIA v2</text>
  </g>

  <!-- Chip - Gen 3 -->
  <g opacity="0.8">
    <rect x="380" y="88" width="140" height="140" rx="6" fill="#111111" stroke="#333333" stroke-width="1.5"/>
    <line x1="415" y1="88" x2="415" y2="228" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="450" y1="88" x2="450" y2="228" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="485" y1="88" x2="485" y2="228" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="380" y1="123" x2="520" y2="123" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="380" y1="158" x2="520" y2="158" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="380" y1="193" x2="520" y2="193" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="415" y="123" width="42" height="42" rx="2" fill="#4B9EFF" opacity="0.55"/>
    <text x="450" y="245" text-anchor="middle" font-family="monospace" font-size="10" fill="#555555">MTIA v3</text>
  </g>

  <!-- Chip - Gen 4 (current, brightest) -->
  <g opacity="1">
    <rect x="545" y="70" width="160" height="160" rx="8" fill="#0e1825" stroke="#4B9EFF" stroke-width="2"/>
    <line x1="585" y1="70" x2="585" y2="230" stroke="#1a2840" stroke-width="1.5"/>
    <line x1="625" y1="70" x2="625" y2="230" stroke="#1a2840" stroke-width="1.5"/>
    <line x1="665" y1="70" x2="665" y2="230" stroke="#1a2840" stroke-width="1.5"/>
    <line x1="545" y1="110" x2="705" y2="110" stroke="#1a2840" stroke-width="1.5"/>
    <line x1="545" y1="150" x2="705" y2="150" stroke="#1a2840" stroke-width="1.5"/>
    <line x1="545" y1="190" x2="705" y2="190" stroke="#1a2840" stroke-width="1.5"/>
    <rect x="585" y="110" width="80" height="80" rx="4" fill="#4B9EFF" opacity="0.25"/>
    <rect x="605" y="130" width="40" height="40" rx="2" fill="#4B9EFF" opacity="0.5"/>
    <!-- pins -->
    <line x1="545" y1="90" x2="528" y2="90" stroke="#4B9EFF" stroke-width="2" opacity="0.7"/>
    <line x1="545" y1="120" x2="528" y2="120" stroke="#4B9EFF" stroke-width="2" opacity="0.7"/>
    <line x1="545" y1="150" x2="528" y2="150" stroke="#4B9EFF" stroke-width="2" opacity="0.7"/>
    <line x1="545" y1="180" x2="528" y2="180" stroke="#4B9EFF" stroke-width="2" opacity="0.7"/>
    <line x1="545" y1="210" x2="528" y2="210" stroke="#4B9EFF" stroke-width="2" opacity="0.7"/>
    <line x1="705" y1="90" x2="722" y2="90" stroke="#4B9EFF" stroke-width="2" opacity="0.7"/>
    <line x1="705" y1="120" x2="722" y2="120" stroke="#4B9EFF" stroke-width="2" opacity="0.7"/>
    <line x1="705" y1="150" x2="722" y2="150" stroke="#4B9EFF" stroke-width="2" opacity="0.7"/>
    <line x1="705" y1="180" x2="722" y2="180" stroke="#4B9EFF" stroke-width="2" opacity="0.7"/>
    <line x1="705" y1="210" x2="722" y2="210" stroke="#4B9EFF" stroke-width="2" opacity="0.7"/>
    <text x="625" y="254" text-anchor="middle" font-family="monospace" font-size="10" fill="#4B9EFF">MTIA v4</text>
  </g>

  <!-- Performance bar chart below -->
  <line x1="96" y1="390" x2="730" y2="390" stroke="#1E1E1E" stroke-width="1"/>
  <rect x="130" y="360" width="28" height="30" rx="2" fill="#1E1E1E"/>
  <rect x="280" y="344" width="28" height="46" rx="2" fill="#2a2a2a"/>
  <rect x="430" y="322" width="28" height="68" rx="2" fill="#333333"/>
  <rect x="580" y="290" width="28" height="100" rx="2" fill="#4B9EFF" opacity="0.7"/>

  <!-- Curve over bars -->
  <path d="M144 358 Q290 340 444 318 Q540 302 594 288" stroke="#4B9EFF" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>

  <text x="96" y="420" font-family="monospace" font-size="11" fill="#555555">INFERENCE SPEED PER GENERATION</text>
  <text x="96" y="440" font-family="monospace" font-size="11" fill="#4B9EFF">FASTER CHIPS</text>
  <text x="96" y="440" font-family="monospace" font-size="11" fill="#555555">             = SMARTER TARGETING</text>
</svg>
