<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <pattern id="g" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#141414"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- Concentric signal rings from a central point -->
  <circle cx="600" cy="300" r="40"  fill="none" stroke="#4B9EFF" stroke-width="2"   opacity="0.8"/>
  <circle cx="600" cy="300" r="90"  fill="none" stroke="#4B9EFF" stroke-width="1.5" opacity="0.45"/>
  <circle cx="600" cy="300" r="150" fill="none" stroke="#4B9EFF" stroke-width="1"   opacity="0.22"/>
  <circle cx="600" cy="300" r="220" fill="none" stroke="#4B9EFF" stroke-width="0.8" opacity="0.12"/>
  <circle cx="600" cy="300" r="300" fill="none" stroke="#4B9EFF" stroke-width="0.5" opacity="0.06"/>

  <!-- Center pin -->
  <circle cx="600" cy="300" r="8" fill="#4B9EFF" opacity="0.95"/>
  <circle cx="600" cy="300" r="4" fill="#0A0A0A"/>

  <!-- Scattered location dots at various radii -->
  <g fill="#E8E8E8">
    <circle cx="520" cy="230" r="4" opacity="0.35"/>
    <circle cx="700" cy="210" r="3" opacity="0.25"/>
    <circle cx="460" cy="340" r="3.5" opacity="0.3"/>
    <circle cx="740" cy="370" r="4" opacity="0.4"/>
    <circle cx="580" cy="430" r="3" opacity="0.25"/>
    <circle cx="680" cy="160" r="2.5" opacity="0.2"/>
    <circle cx="420" cy="260" r="3" opacity="0.22"/>
    <circle cx="800" cy="290" r="3.5" opacity="0.3"/>
  </g>

  <!-- Highlight one nearby dot as converting -->
  <circle cx="520" cy="230" r="8"  fill="none" stroke="#4B9EFF" stroke-width="1.5" opacity="0.6"/>
  <circle cx="520" cy="230" r="14" fill="none" stroke="#4B9EFF" stroke-width="0.5" opacity="0.2"/>
  <line x1="520" y1="230" x2="592" y2="292" stroke="#4B9EFF" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Label -->
  <text x="60" y="596" font-family="monospace" font-size="11" fill="#2a2a2a" letter-spacing="3">LOCAL INTENT</text>
  <line x1="195" y1="591" x2="500" y2="591" stroke="#1A1A1A" stroke-width="1"/>
</svg>
