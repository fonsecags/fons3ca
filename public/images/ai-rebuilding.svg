<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <pattern id="g" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#141414"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- Old foundation: crumbling blocks, grey -->
  <g opacity="0.35">
    <rect x="100" y="440" width="120" height="60" rx="2" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="240" y="420" width="100" height="80" rx="2" fill="#1a1a1a" stroke="#222222" stroke-width="1" transform="rotate(-2 290 460)"/>
    <rect x="360" y="450" width="110" height="50" rx="2" fill="#1a1a1a" stroke="#202020" stroke-width="1" transform="rotate(1.5 415 475)"/>
    <rect x="490" y="430" width="90" height="70" rx="2" fill="#181818" stroke="#222222" stroke-width="1" transform="rotate(-1 535 465)"/>
    <!-- cracks -->
    <line x1="155" y1="440" x2="162" y2="500" stroke="#0f0f0f" stroke-width="1.5"/>
    <line x1="280" y1="420" x2="272" y2="500" stroke="#0f0f0f" stroke-width="1.5"/>
  </g>

  <!-- New structure rising: clean blue scaffolding right side -->
  <g>
    <!-- Vertical pillars -->
    <rect x="700" y="200" width="8" height="320" rx="2" fill="#4B9EFF" opacity="0.7"/>
    <rect x="880" y="240" width="8" height="280" rx="2" fill="#4B9EFF" opacity="0.7"/>
    <rect x="1060" y="280" width="8" height="240" rx="2" fill="#4B9EFF" opacity="0.5"/>

    <!-- Horizontal beams -->
    <rect x="700" y="200" width="368" height="6" rx="2" fill="#4B9EFF" opacity="0.5"/>
    <rect x="700" y="310" width="368" height="4" rx="2" fill="#4B9EFF" opacity="0.3"/>
    <rect x="700" y="415" width="368" height="4" rx="2" fill="#4B9EFF" opacity="0.2"/>

    <!-- Platform top glow -->
    <rect x="680" y="192" width="408" height="16" rx="3" fill="#0D1F36" stroke="#4B9EFF" stroke-width="1" opacity="0.8"/>
  </g>

  <!-- Dividing line -->
  <line x1="600" y1="120" x2="600" y2="560" stroke="#1E1E1E" stroke-width="1" stroke-dasharray="6 5"/>

  <!-- Left label -->
  <text x="100" y="580" font-family="monospace" font-size="10" fill="#252525" letter-spacing="2">OLD FOUNDATION</text>
  <!-- Right label -->
  <text x="720" y="580" font-family="monospace" font-size="10" fill="#4B9EFF" letter-spacing="2" opacity="0.5">REBUILDING</text>

  <text x="60" y="610" font-family="monospace" font-size="11" fill="#1a1a1a" letter-spacing="3">STRUCTURE</text>
</svg>
