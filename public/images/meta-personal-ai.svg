<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Background -->
  <rect width="800" height="500" fill="#0A0A0A"/>

  <!-- Central user node -->
  <circle cx="400" cy="250" r="36" fill="#111111" stroke="#4B9EFF" stroke-width="2"/>
  <circle cx="400" cy="235" r="12" fill="#4B9EFF" opacity="0.6"/>
  <path d="M374 265 Q374 254 400 254 Q426 254 426 265" fill="#4B9EFF" opacity="0.6"/>

  <!-- AI layer ring -->
  <circle cx="400" cy="250" r="80" stroke="#4B9EFF" stroke-width="1" stroke-dasharray="6 4" opacity="0.4"/>

  <!-- Outer platform ring (ads ecosystem) -->
  <circle cx="400" cy="250" r="150" stroke="#1E1E1E" stroke-width="1.5" opacity="0.6"/>

  <!-- AI assistant nodes around user -->
  <circle cx="400" cy="170" r="18" fill="#111111" stroke="#4B9EFF" stroke-width="1.5"/>
  <text x="400" y="175" text-anchor="middle" font-family="monospace" font-size="12" fill="#4B9EFF">AI</text>

  <circle cx="468" cy="290" r="18" fill="#111111" stroke="#4B9EFF" stroke-width="1.5" opacity="0.7"/>
  <text x="468" y="295" text-anchor="middle" font-family="monospace" font-size="12" fill="#4B9EFF" opacity="0.7">AI</text>

  <circle cx="332" cy="290" r="18" fill="#111111" stroke="#4B9EFF" stroke-width="1.5" opacity="0.5"/>
  <text x="332" y="295" text-anchor="middle" font-family="monospace" font-size="12" fill="#4B9EFF" opacity="0.5">AI</text>

  <!-- Lines from user to AI nodes -->
  <line x1="400" y1="214" x2="400" y2="188" stroke="#4B9EFF" stroke-width="1" opacity="0.5"/>
  <line x1="433" y1="272" x2="451" y2="277" stroke="#4B9EFF" stroke-width="1" opacity="0.4"/>
  <line x1="367" y1="272" x2="349" y2="277" stroke="#4B9EFF" stroke-width="1" opacity="0.3"/>

  <!-- Outer ad/platform nodes - now filtered through AI -->
  <circle cx="400" cy="100" r="14" fill="#1E1E1E" stroke="#555555" stroke-width="1"/>
  <text x="400" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#555555">AD</text>

  <circle cx="516" cy="161" r="14" fill="#1E1E1E" stroke="#555555" stroke-width="1"/>
  <text x="516" y="166" text-anchor="middle" font-family="monospace" font-size="9" fill="#555555">AD</text>

  <circle cx="550" cy="300" r="14" fill="#1E1E1E" stroke="#555555" stroke-width="1"/>
  <text x="550" y="305" text-anchor="middle" font-family="monospace" font-size="9" fill="#555555">AD</text>

  <circle cx="250" cy="161" r="14" fill="#1E1E1E" stroke="#555555" stroke-width="1"/>
  <text x="250" y="166" text-anchor="middle" font-family="monospace" font-size="9" fill="#555555">AD</text>

  <circle cx="284" cy="360" r="14" fill="#1E1E1E" stroke="#555555" stroke-width="1"/>
  <text x="284" y="365" text-anchor="middle" font-family="monospace" font-size="9" fill="#555555">AD</text>

  <!-- Dotted lines from outer nodes to AI ring (intercepted) -->
  <line x1="400" y1="114" x2="400" y2="152" stroke="#555555" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="505" y1="169" x2="476" y2="185" stroke="#555555" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="537" y1="291" x2="485" y2="274" stroke="#555555" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="263" y1="169" x2="312" y2="195" stroke="#555555" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="296" y1="347" x2="341" y2="297" stroke="#555555" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- Filter label on AI ring -->
  <rect x="455" y="218" width="52" height="18" rx="3" fill="#111111" stroke="#4B9EFF" stroke-width="1"/>
  <text x="481" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#4B9EFF">FILTER</text>

  <!-- Label text -->
  <text x="96" y="440" font-family="monospace" font-size="11" fill="#555555">AI MEDIATED ATTENTION</text>
  <text x="96" y="460" font-family="monospace" font-size="11" fill="#4B9EFF">BRAND SIGNAL NOW</text>
  <text x="96" y="460" font-family="monospace" font-size="11" fill="#555555">                  = REACH LATER</text>
</svg>
