<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <pattern id="g" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#141414"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- Three stacked layers: a query travelling from search to answer to citation -->

  <!-- SEO panel (left) -->
  <g>
    <rect x="90" y="180" width="300" height="270" rx="4" fill="#101010" stroke="#1E1E1E" stroke-width="1"/>
    <text x="120" y="240" font-family="monospace" font-size="34" fill="#E8E8E8" letter-spacing="2">SEO</text>
    <text x="120" y="268" font-family="monospace" font-size="11" fill="#555555" letter-spacing="2">SEARCH ENGINE</text>
    <!-- ranked result bars -->
    <rect x="120" y="300" width="240" height="14" rx="2" fill="#4B9EFF" opacity="0.7"/>
    <rect x="120" y="328" width="200" height="10" rx="2" fill="#2a2a2a"/>
    <rect x="120" y="350" width="220" height="10" rx="2" fill="#222222"/>
    <rect x="120" y="372" width="180" height="10" rx="2" fill="#1c1c1c"/>
    <text x="120" y="420" font-family="monospace" font-size="10" fill="#555555" letter-spacing="2">RANK THE PAGE</text>
  </g>

  <!-- AEO panel (centre) -->
  <g>
    <rect x="450" y="180" width="300" height="270" rx="4" fill="#101010" stroke="#1E1E1E" stroke-width="1"/>
    <text x="480" y="240" font-family="monospace" font-size="34" fill="#E8E8E8" letter-spacing="2">AEO</text>
    <text x="480" y="268" font-family="monospace" font-size="11" fill="#555555" letter-spacing="2">ANSWER ENGINE</text>
    <!-- answer box -->
    <rect x="480" y="296" width="240" height="92" rx="3" fill="#0D1F36" stroke="#4B9EFF" stroke-width="1" opacity="0.85"/>
    <rect x="498" y="316" width="180" height="9" rx="2" fill="#4B9EFF" opacity="0.55"/>
    <rect x="498" y="334" width="204" height="8" rx="2" fill="#4B9EFF" opacity="0.3"/>
    <rect x="498" y="350" width="150" height="8" rx="2" fill="#4B9EFF" opacity="0.25"/>
    <text x="480" y="420" font-family="monospace" font-size="10" fill="#555555" letter-spacing="2">OWN THE ANSWER</text>
  </g>

  <!-- GEO panel (right) -->
  <g>
    <rect x="810" y="180" width="300" height="270" rx="4" fill="#101010" stroke="#1E1E1E" stroke-width="1"/>
    <text x="840" y="240" font-family="monospace" font-size="34" fill="#E8E8E8" letter-spacing="2">GEO</text>
    <text x="840" y="268" font-family="monospace" font-size="11" fill="#555555" letter-spacing="2">GENERATIVE ENGINE</text>
    <!-- citation by name -->
    <circle cx="852" cy="312" r="5" fill="#4B9EFF" opacity="0.9"/>
    <rect x="868" y="307" width="170" height="10" rx="2" fill="#E8E8E8" opacity="0.65"/>
    <circle cx="852" cy="342" r="5" fill="#4B9EFF" opacity="0.6"/>
    <rect x="868" y="337" width="140" height="10" rx="2" fill="#E8E8E8" opacity="0.4"/>
    <circle cx="852" cy="372" r="5" fill="#4B9EFF" opacity="0.4"/>
    <rect x="868" y="367" width="120" height="10" rx="2" fill="#E8E8E8" opacity="0.28"/>
    <text x="840" y="420" font-family="monospace" font-size="10" fill="#555555" letter-spacing="2">GET CITED BY NAME</text>
  </g>

  <!-- Flow arrows between panels -->
  <g stroke="#4B9EFF" stroke-width="1.5" opacity="0.4" fill="none">
    <line x1="392" y1="315" x2="448" y2="315" stroke-dasharray="4 4"/>
    <line x1="752" y1="315" x2="808" y2="315" stroke-dasharray="4 4"/>
  </g>
  <g fill="#4B9EFF" opacity="0.5">
    <path d="M448 315 l-10 -5 v10 z"/>
    <path d="M808 315 l-10 -5 v10 z"/>
  </g>

  <!-- Top query input -->
  <rect x="90" y="100" width="1020" height="40" rx="20" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
  <circle cx="118" cy="120" r="6" fill="none" stroke="#555555" stroke-width="2"/>
  <line x1="123" y1="125" x2="130" y2="132" stroke="#555555" stroke-width="2"/>
  <text x="150" y="125" font-family="monospace" font-size="13" fill="#555555" letter-spacing="1">how customers actually find you now</text>

  <!-- Footer label -->
  <text x="90" y="600" font-family="monospace" font-size="11" fill="#2a2a2a" letter-spacing="3">SEO / AEO / GEO</text>
  <line x1="290" y1="595" x2="1110" y2="595" stroke="#1A1A1A" stroke-width="1"/>
</svg>
