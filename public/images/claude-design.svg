<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Background -->
  <rect width="800" height="500" fill="#0A0A0A"/>

  <!-- Left panel: Design system inputs -->
  <rect x="40" y="95" width="185" height="310" rx="2" fill="#0D0D0D" stroke="#1E1E1E" stroke-width="1"/>

  <!-- Color tokens -->
  <rect x="58" y="115" width="14" height="14" rx="2" fill="#4B9EFF"/>
  <rect x="78" y="115" width="14" height="14" rx="2" fill="#0D1F36" stroke="#4B9EFF" stroke-width="0.5"/>
  <rect x="98" y="115" width="14" height="14" rx="2" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="118" y="115" width="14" height="14" rx="2" fill="#E8E8E8" opacity="0.4"/>
  <text x="58" y="147" font-family="monospace" font-size="8" fill="#333333" letter-spacing="1">TOKENS</text>

  <!-- Component lines -->
  <rect x="58" y="158" width="150" height="7" rx="1" fill="#141414" stroke="#222222" stroke-width="1"/>
  <rect x="58" y="172" width="105" height="7" rx="1" fill="#141414" stroke="#222222" stroke-width="1"/>
  <rect x="58" y="186" width="135" height="7" rx="1" fill="#141414" stroke="#222222" stroke-width="1"/>
  <text x="58" y="212" font-family="monospace" font-size="8" fill="#333333" letter-spacing="1">COMPONENTS</text>

  <!-- Component boxes dashed -->
  <rect x="58" y="220" width="64" height="44" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="130" y="220" width="80" height="44" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Typography lines -->
  <rect x="58" y="280" width="150" height="11" rx="1" fill="#141414" stroke="#4B9EFF" stroke-width="0.5" opacity="0.4"/>
  <rect x="58" y="299" width="105" height="7" rx="1" fill="#141414" stroke="#222222" stroke-width="1"/>
  <rect x="58" y="313" width="125" height="7" rx="1" fill="#141414" stroke="#222222" stroke-width="1"/>
  <text x="58" y="338" font-family="monospace" font-size="8" fill="#333333" letter-spacing="1">TYPOGRAPHY</text>

  <!-- Bottom label -->
  <text x="58" y="385" font-family="monospace" font-size="9" fill="#444444" letter-spacing="2">DESIGN SYSTEM</text>

  <!-- Flow arrow left to center -->
  <line x1="227" y1="250" x2="347" y2="250" stroke="#4B9EFF" stroke-width="1" opacity="0.25" stroke-dasharray="4 3"/>
  <polygon points="345,245 357,250 345,255" fill="#4B9EFF" opacity="0.25"/>

  <!-- Center: Claude AI node -->
  <circle cx="400" cy="250" r="78" stroke="#4B9EFF" stroke-width="0.5" stroke-dasharray="5 4" opacity="0.15"/>
  <circle cx="400" cy="250" r="54" stroke="#4B9EFF" stroke-width="1" opacity="0.35"/>
  <circle cx="400" cy="250" r="36" fill="#0D1F36" stroke="#4B9EFF" stroke-width="1.5"/>
  <text x="400" y="247" text-anchor="middle" font-family="monospace" font-size="9" fill="#4B9EFF" letter-spacing="1">CLAUDE</text>
  <text x="400" y="261" text-anchor="middle" font-family="monospace" font-size="8" fill="#4B9EFF" opacity="0.6" letter-spacing="1">DESIGN</text>

  <!-- Orbiting dots -->
  <circle cx="400" cy="196" r="4" fill="#4B9EFF" opacity="0.7"/>
  <circle cx="449" cy="272" r="3" fill="#4B9EFF" opacity="0.4"/>
  <circle cx="352" cy="270" r="3" fill="#4B9EFF" opacity="0.4"/>

  <!-- Prompt input chip -->
  <rect x="316" y="138" width="168" height="24" rx="3" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="328" y="154" font-family="monospace" font-size="8" fill="#444444">create a landing page...</text>
  <line x1="400" y1="162" x2="400" y2="196" stroke="#4B9EFF" stroke-width="1" opacity="0.3" stroke-dasharray="3 2"/>

  <!-- Flow arrow center to right -->
  <line x1="438" y1="250" x2="550" y2="250" stroke="#4B9EFF" stroke-width="1" opacity="0.6"/>
  <polygon points="548,245 560,250 548,255" fill="#4B9EFF" opacity="0.6"/>

  <!-- Right panel: Generated output canvas -->
  <rect x="562" y="100" width="200" height="300" rx="2" fill="#0D0D0D" stroke="#4B9EFF" stroke-width="1" opacity="0.7"/>

  <!-- Browser chrome bar -->
  <rect x="562" y="100" width="200" height="22" rx="2" fill="#111111" stroke="#4B9EFF" stroke-width="1" opacity="0.7"/>
  <circle cx="578" cy="111" r="4" fill="#1a1a1a" stroke="#222222" stroke-width="1"/>
  <circle cx="592" cy="111" r="4" fill="#1a1a1a" stroke="#222222" stroke-width="1"/>
  <circle cx="606" cy="111" r="4" fill="#1a1a1a" stroke="#222222" stroke-width="1"/>

  <!-- Hero section -->
  <rect x="578" y="132" width="168" height="58" rx="2" fill="#0D1F36" stroke="#4B9EFF" stroke-width="0.5" opacity="0.6"/>
  <rect x="590" y="144" width="78" height="8" rx="1" fill="#4B9EFF" opacity="0.55"/>
  <rect x="590" y="158" width="115" height="5" rx="1" fill="#2a2a2a"/>
  <rect x="590" y="168" width="90" height="5" rx="1" fill="#2a2a2a"/>

  <!-- Card row -->
  <rect x="578" y="200" width="78" height="62" rx="2" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>
  <rect x="662" y="200" width="84" height="62" rx="2" fill="#111111" stroke="#1E1E1E" stroke-width="1"/>

  <!-- Text lines -->
  <rect x="578" y="272" width="168" height="7" rx="1" fill="#141414" stroke="#1E1E1E" stroke-width="1"/>
  <rect x="578" y="286" width="120" height="7" rx="1" fill="#141414" stroke="#1E1E1E" stroke-width="1"/>
  <rect x="578" y="300" width="140" height="7" rx="1" fill="#141414" stroke="#1E1E1E" stroke-width="1"/>

  <!-- CTA button -->
  <rect x="578" y="320" width="74" height="22" rx="2" fill="#4B9EFF" opacity="0.75"/>
  <text x="615" y="335" text-anchor="middle" font-family="monospace" font-size="7" fill="#0A0A0A" letter-spacing="0.5">GET STARTED</text>

  <!-- Export chips bottom right -->
  <rect x="578" y="358" width="38" height="14" rx="2" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="597" y="369" text-anchor="middle" font-family="monospace" font-size="7" fill="#444444">PDF</text>
  <rect x="622" y="358" width="44" height="14" rx="2" fill="#111111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="644" y="369" text-anchor="middle" font-family="monospace" font-size="7" fill="#444444">PPTX</text>
  <rect x="672" y="358" width="48" height="14" rx="2" fill="#111111" stroke="#4B9EFF" stroke-width="0.5" opacity="0.6"/>
  <text x="696" y="369" text-anchor="middle" font-family="monospace" font-size="7" fill="#4B9EFF" opacity="0.6">CANVA</text>

  <!-- Bottom labels -->
  <text x="58" y="450" font-family="monospace" font-size="10" fill="#2a2a2a" letter-spacing="2">INPUT</text>
  <text x="350" y="450" font-family="monospace" font-size="10" fill="#4B9EFF" opacity="0.5" letter-spacing="2">AI</text>
  <text x="580" y="450" font-family="monospace" font-size="10" fill="#4B9EFF" opacity="0.35" letter-spacing="2">OUTPUT</text>
</svg>
